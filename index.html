<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Playbook</title>
<link rel="icon" type="image/png" href="images/glass-apple2.png">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FDFCF5;
  --txt: #2D3748;
  --txt2: #4A5568;
  --txt3: #A0AEC0;
  --lavender: #C4B5E0;
  --mint: #A8D8CB;
  --peach: #F5C5B8;
  --soft-blue: #B5CDE0;
  --card: #fff;
  --bdr: rgba(45,55,72,.06);
  --sf: 'Crimson Pro', Georgia, serif;
  --st: 'Crimson Text', serif;
  --sm: 'JetBrains Mono', monospace;
  --spring: cubic-bezier(.175,.885,.32,1.275);
  --eo: cubic-bezier(.16,1,.3,1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--sf);
  color: var(--txt);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
::selection { background: rgba(196,181,224,.2); color: var(--txt); }

@keyframes si {
  0% { opacity: 0; transform: translateY(18px) scale(.97); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.si { opacity: 0; animation: si .7s var(--eo) forwards; }
.s1 { animation-delay: .06s; }
.s2 { animation-delay: .14s; }
.s3 { animation-delay: .24s; }
.s4 { animation-delay: .36s; }
.s5 { animation-delay: .48s; }

/* ── Layout ── */
.dash {
  height: 100vh;
  display: grid;
  grid-template-columns: 200px 1fr;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  background: rgba(255,255,255,.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-right: 1px solid var(--bdr);
  display: flex;
  flex-direction: column;
  padding: 2rem 1rem;
  gap: 0;
  position: relative;
  z-index: 10;
}

.site-title {
  font-family: var(--sm);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--txt2);
  padding: 0 .6rem;
  margin-bottom: 2.4rem;
}

.nav-list {
  display: flex;
  flex-direction: column;
  gap: .35rem;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: .7rem;
  width: 100%;
  padding: .7rem .8rem;
  border: none;
  border-radius: 14px;
  background: transparent;
  cursor: pointer;
  font-family: var(--sf);
  font-size: 1rem;
  font-weight: 600;
  color: var(--txt3);
  transition: all .35s var(--eo);
  position: relative;
}

.nav-btn:hover {
  color: var(--txt2);
  background: rgba(45,55,72,.03);
}

.nav-btn .nav-icon {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .35s var(--spring);
}

.nav-btn .nav-label {
  transition: color .3s var(--eo);
}

/* Accent colors per button */
.nav-btn[data-v="explore"] .nav-icon { background: rgba(196,181,224,.15); }
.nav-btn[data-v="research"] .nav-icon { background: rgba(168,216,203,.15); }
.nav-btn[data-v="write"] .nav-icon { background: rgba(245,197,184,.15); }
.nav-btn[data-v="design"] .nav-icon { background: rgba(181,205,224,.15); }

/* Active states */
.nav-btn.on[data-v="explore"] {
  background: rgba(196,181,224,.12);
  color: var(--txt);
}
.nav-btn.on[data-v="explore"] .nav-icon {
  background: rgba(196,181,224,.3);
  box-shadow: 0 2px 10px rgba(196,181,224,.2);
}

.nav-btn.on[data-v="research"] {
  background: rgba(168,216,203,.12);
  color: var(--txt);
}
.nav-btn.on[data-v="research"] .nav-icon {
  background: rgba(168,216,203,.3);
  box-shadow: 0 2px 10px rgba(168,216,203,.2);
}

.nav-btn.on[data-v="write"] {
  background: rgba(245,197,184,.12);
  color: var(--txt);
}
.nav-btn.on[data-v="write"] .nav-icon {
  background: rgba(245,197,184,.3);
  box-shadow: 0 2px 10px rgba(245,197,184,.2);
}

.nav-btn.on[data-v="design"] {
  background: rgba(181,205,224,.12);
  color: var(--txt);
}
.nav-btn.on[data-v="design"] .nav-icon {
  background: rgba(181,205,224,.3);
  box-shadow: 0 2px 10px rgba(181,205,224,.2);
}

.nav-btn.on .nav-icon svg {
  filter: drop-shadow(0 0 4px currentColor);
}

/* Keyboard hint */
.nav-key {
  font-family: var(--sm);
  font-size: 9px;
  font-weight: 500;
  color: var(--txt3);
  opacity: .4;
  margin-left: auto;
  transition: opacity .3s;
}
.nav-btn:hover .nav-key,
.nav-btn.on .nav-key {
  opacity: .7;
}

/* Sidebar footer */
.sidebar-footer {
  margin-top: auto;
  padding: 0 .6rem;
  font-family: var(--sm);
  font-size: 8.5px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--txt3);
  opacity: .5;
}

/* ── Main Content ── */
.main {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

.panel {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 2.4rem 2.8rem;
}

.panel::-webkit-scrollbar { width: 3px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: var(--txt3); border-radius: 2px; opacity: .3; }

.panel-title {
  font-family: var(--sf);
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--txt);
  margin-bottom: .5rem;
  letter-spacing: -.01em;
}

.panel-sub {
  font-family: var(--st);
  font-size: .95rem;
  color: var(--txt3);
  line-height: 1.5;
}

/* ── Mobile ── */
@media (max-width: 900px) {
  .dash { grid-template-columns: 1fr !important; }
  .sidebar { display: none !important; }
  .panel { padding: 1.8rem 1.4rem !important; }
}
</style>
</head>
<body>

<div class="dash">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="site-title si s1">Prompt Playbook</div>

    <div class="nav-list">
      <button class="nav-btn on si s2" data-v="explore" onclick="go('explore',this)">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--lavender)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88" fill="rgba(196,181,224,.3)" stroke="var(--lavender)"/>
          </svg>
        </span>
        <span class="nav-label">Explore</span>
        <span class="nav-key">1</span>
      </button>

      <button class="nav-btn si s3" data-v="research" onclick="go('research',this)">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--mint)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21"/>
            <line x1="11" y1="8" x2="11" y2="14"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </span>
        <span class="nav-label">Research</span>
        <span class="nav-key">2</span>
      </button>

      <button class="nav-btn si s4" data-v="write" onclick="go('write',this)">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--peach)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
          </svg>
        </span>
        <span class="nav-label">Write</span>
        <span class="nav-key">3</span>
      </button>

      <button class="nav-btn si s5" data-v="design" onclick="go('design',this)">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--soft-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
        </span>
        <span class="nav-label">Design</span>
        <span class="nav-key">4</span>
      </button>
    </div>

    <div class="sidebar-footer">v1.0</div>
  </aside>

  <!-- Main Content -->
  <div class="main">

    <div id="p-explore" class="panel" style="display:block">
      <h2 class="panel-title si s2">Explore</h2>
      <p class="panel-sub si s3">Browse the full prompt collection.</p>
    </div>

    <div id="p-research" class="panel" style="display:none">
      <h2 class="panel-title">Research</h2>
      <p class="panel-sub">Prompts for academic research workflows.</p>
    </div>

    <div id="p-write" class="panel" style="display:none">
      <h2 class="panel-title">Write</h2>
      <p class="panel-sub">Prompts for writing and revision.</p>
    </div>

    <div id="p-design" class="panel" style="display:none">
      <h2 class="panel-title">Design</h2>
      <p class="panel-sub">Prompts for design and visual thinking.</p>
    </div>

  </div>

</div>

<script>
function go(id, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
  const p = document.getElementById('p-' + id);
  p.style.display = 'block';
}

document.addEventListener('keydown', e => {
  const k = {'1':'explore','2':'research','3':'write','4':'design'};
  if (k[e.key]) {
    const b = document.querySelector('.nav-btn[data-v="' + k[e.key] + '"]');
    if (b) go(k[e.key], b);
  }
});
</script>

</body>
</html>
